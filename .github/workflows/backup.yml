name: CRM Backup

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Tipo de backup'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - db
          - code

jobs:
  backup-db:
    name: Backup DB
    if: github.event.inputs.backup_type != 'code'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 18 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          sudo ln -sf /usr/lib/postgresql/18/bin/pg_dump /usr/local/bin/pg_dump
          sudo ln -sf /usr/lib/postgresql/18/bin/pg_dumpall /usr/local/bin/pg_dumpall

      - name: Install rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Run DB backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/*.sh
          bash scripts/run-backup-db.sh

      - name: Backup DB summary
        if: success()
        run: |
          echo "## DB Backup Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination**: gdrive:CRM-Backups/daily/" >> $GITHUB_STEP_SUMMARY

  backup-code:
    name: Backup Code
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.backup_type == 'all' || github.event.inputs.backup_type == 'code')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Run Code backup
        run: |
          chmod +x scripts/*.sh
          bash scripts/run-backup-code.sh

      - name: Backup Code summary
        if: success()
        run: |
          echo "## Code Backup Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Destination**: gdrive:CRM-Backups/weekly/" >> $GITHUB_STEP_SUMMARY

  cleanup:
    name: Cleanup old backups
    needs: [backup-db, backup-code]
    if: always() && (needs.backup-db.result == 'success' || needs.backup-code.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install rclone
        env:
          RCLONE_CONFIG_B64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_B64" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Cleanup old backups
        run: |
          rclone delete gdrive:CRM-Backups/daily/ --max-age 7d --min-age 1d 2>&1 || true
          rclone delete gdrive:CRM-Backups/weekly/ --max-age 90d --min-age 1d 2>&1 || true
          echo "## Cleanup Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Daily retention**: 7 days" >> $GITHUB_STEP_SUMMARY
          echo "- **Weekly retention**: 90 days" >> $GITHUB_STEP_SUMMARY
