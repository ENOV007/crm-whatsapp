name: CRM Backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Tipo de backup'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  backup:
    name: CRM Backup (DB + Code)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 18 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          sudo update-alternatives --set pg_dump /usr/lib/postgresql/18/bin/pg_dump
          sudo update-alternatives --set pg_dumpall /usr/lib/postgresql/18/bin/pg_dumpall

      - name: Install rclone
        run: |
          sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Run full backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          chmod +x scripts/*.sh
          bash scripts/run-backup.sh

      - name: Backup summary
        if: success()
        run: |
          echo "## CRM Backup Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: daily" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "## CRM Backup FAILED ❌" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **Check logs for details**" >> $GITHUB_STEP_SUMMARY
