services:
  db:
    image: postgres:15-alpine
    container_name: crm-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_database}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@db:5432/${POSTGRES_DB:-crm_database}?schema=public
      JWT_SECRET: ${JWT_SECRET:-mi-secreto-super-seguro-para-desarrollo}
      PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

  whatsapp:
    image: atendai/wppconnect-server:latest
    container_name: crm-whatsapp
    restart: unless-stopped
    ports:
      - "${WPPCONNECT_PORT:-21465}:21465"
    environment:
      - SECRET_KEY=${WPPCONNECT_SECRET:-crm-whatsapp-secret-key-2026}
      - SERVER_PORT=21465
      - START_ALL_SESSION=true
      - TOKEN_STORE_TYPE=file
      - WEBHOOK_URL=${WPPCONNECT_WEBHOOK_URL:-}
      - WEBHOOK_AUTO_DOWNLOAD=true
      - WEBHOOK_READ_MESSAGE=true
    volumes:
      - wppconnect_tokens:/usr/src/app/wppconnect_tokens

volumes:
  postgres_data:
  wppconnect_tokens:
